<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Name Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
        }

        #result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Band Name Generator</h1>

<input id="color" placeholder="Favorite color">

<input id="plant" placeholder="Favorite plant">

<button onclick="generateBandName()">
    Generate
</button>

<p id="result"></p>

<script>
function generateBandName() {
    const color = document.getElementById("color").value.trim();
    const plant = document.getElementById("plant").value.trim();

    if (!color || !plant) {
        document.getElementById("result").textContent =
            "Please enter both values.";
        return;
    }

    document.getElementById("result").textContent =
        `Your band name could be ${color} ${plant}`;
}
</script>

</body>
</html>
